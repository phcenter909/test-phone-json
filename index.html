<!DOCTYPE html>
<html lang="pt">

<!-- Link planilha https://docs.google.com/spreadsheets/d/1vF0D_WJXH5RUC7liF3fbcZCrLvre_xEGFGTD3FDYq1U/edit?gid=0#gid=0 -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Phone House </title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-light">
    
    <!-- Header -->
    <header class="bg-white shadow-sm" id="header">
        <div class="container py-4">
            <div class="text-center">
                <img src="assets/logo_ph.png" alt="Phone House Logo" class="logo-header">
                <h1 class="h3 fw-bold mb-0 text-dark">Phone House</h1>
                <p class="text-muted small mb-0">Especialistas em smartphones, acessórios e mais!</p>
            </div>
        </div>
    </header>

    <main class="container py-5">
        
        <!-- Filtros -->
        <div class="row g-3 mb-5">
            <div class="col-md-6">
                <input
                    type="text"
                    id="search-input"
                    class="form-control form-control-lg"
                    placeholder="🔍 Buscar produtos..."
                >
            </div>
            <div class="col-md-3">
                <select id="category-filter" class="form-select form-select-lg">
                    <option value="">Estado aparelho</option>
                </select>
            </div>
            <div class="col-md-3">
                <button class="btn btn-outline-success btn-lg w-100" onclick="askForXiaomi()">
                    <i class="bi bi-whatsapp me-2"></i> Procura um Xiaomi?
                </button>
            </div>
        </div>

        <!-- Grid de Produtos -->
        <div id="products-grid" class="row g-4" data-products-grid>
            <!-- Produtos carregados via JavaScript -->
        </div>

    </main>

    <footer class="bg-white py-4 border-top mt-5">
        <div class="container text-center text-muted small">
            PhStore (mini) • Carregado via Google Sheets
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/script.js"></script>
</body>
</html>
